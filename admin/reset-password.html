<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Nové heslo | Leutschau Café</title>
    <link rel="stylesheet" href="../css/bootstrap.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background: #1a1a1a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: #2a2a2a; padding: 2rem; border-radius: 8px; width: 100%; max-width: 400px; }
        .form-input { background: #333; border: 1px solid #444; color: white; width: 100%; padding: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h4 class="text-center mb-4">Zadajte nové heslo</h4>
        <input type="password" id="new-password" class="form-input" placeholder="Nové heslo" required>
        <button id="update-btn" class="button button-primary w-100">Zmeniť heslo</button>
        <div id="status" class="mt-3 text-center"></div>
    </div>

    <script type="module">
        import { supabase } from '../js/supabase-client.js';
        document.getElementById('update-btn').onclick = async () => {
            const newPassword = document.getElementById('new-password').value;
            const { error } = await supabase.auth.updateUser({ password: newPassword });
            const status = document.getElementById('status');
            if (error) {
                status.innerText = error.message; status.style.color = '#ff6b6b';
            } else {
                status.innerText = 'Heslo bolo zmenené! Môžete sa prihlásiť.'; status.style.color = '#51cf66';
                setTimeout(() => window.location.href = 'index.html', 2000);
            }
        };
    </script>
</body>
</html>
