<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Zabudnuté heslo | Leutschau Café</title>
    <link rel="stylesheet" href="../css/bootstrap.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background: #1a1a1a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: #2a2a2a; padding: 2rem; border-radius: 8px; width: 100%; max-width: 400px; }
        .form-input { background: #333; border: 1px solid #444; color: white; width: 100%; padding: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h4 class="text-center mb-4">Obnova hesla</h4>
        <p style="font-size: 0.9rem; color: #ccc;">Zadajte svoj e-mail a pošleme vám odkaz na zmenu hesla.</p>
        <input type="email" id="email" class="form-input" placeholder="Váš email" required>
        <button id="reset-btn" class="button button-primary w-100">Poslať odkaz</button>
        <div id="status" class="mt-3 text-center" style="font-size: 0.9rem;"></div>
        <div class="text-center mt-3"><a href="index.html" style="color: #aaa;">Späť na prihlásenie</a></div>
    </div>

    <script type="module">
        import { supabase } from '../js/supabase-client.js';
        document.getElementById('reset-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const { error } = await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/admin/reset-password.html',
            });
            const status = document.getElementById('status');
            if (error) {
                status.innerText = error.message; status.style.color = '#ff6b6b';
            } else {
                status.innerText = 'E-mail bol odoslaný! Skontrolujte si schránku.'; status.style.color = '#51cf66';
            }
        };
    </script>
</body>
</html>
